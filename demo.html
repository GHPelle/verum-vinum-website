<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verum Vinum – Desktop &amp; Mobil Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 30px 20px;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 24px;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 2px;
    }
    .container {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 40px;
    }
    .device-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .device-label {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 12px;
    }

    /* Desktop / MacBook */
    .laptop {
      width: 820px;
      position: relative;
    }
    .laptop-screen {
      background: #1a1a1a;
      border-radius: 12px 12px 0 0;
      padding: 10px 10px 0 10px;
      position: relative;
    }
    .laptop-screen::before {
      content: '';
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      background: #333;
      border-radius: 50%;
    }
    .laptop-screen iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 4px 4px 0 0;
      background: white;
    }
    .laptop-base {
      background: linear-gradient(to bottom, #2a2a2a, #1a1a1a);
      height: 14px;
      border-radius: 0 0 4px 4px;
      position: relative;
    }
    .laptop-base::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 6px;
      background: #222;
      border-radius: 0 0 6px 6px;
    }
    .laptop-shadow {
      width: 90%;
      height: 8px;
      margin: 0 auto;
      background: radial-gradient(ellipse, rgba(0,0,0,0.3) 0%, transparent 70%);
      margin-top: 8px;
    }

    /* iPhone */
    .phone {
      width: 280px;
      height: 605px;
      border-radius: 44px;
      background: #1a1a1a;
      padding: 10px;
      box-shadow:
        0 0 0 2px #333,
        0 0 0 4px #1a1a1a,
        0 20px 40px rgba(0,0,0,0.4),
        inset 0 0 3px rgba(255,255,255,0.05);
      position: relative;
      flex-shrink: 0;
    }
    .phone::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 28px;
      background: #1a1a1a;
      border-radius: 0 0 16px 16px;
      z-index: 10;
    }
    .phone::after {
      content: '';
      position: absolute;
      top: 17px;
      left: 50%;
      transform: translateX(24px);
      width: 10px;
      height: 10px;
      background: #0a0a0a;
      border-radius: 50%;
      z-index: 11;
      box-shadow: inset 0 0 2px rgba(30,60,120,0.6);
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 35px;
      overflow: hidden;
      background: #000;
    }
    .phone-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 35px;
    }
    .btn-power {
      position: absolute;
      right: -3px;
      top: 140px;
      width: 3px;
      height: 60px;
      background: #333;
      border-radius: 0 2px 2px 0;
    }
    .btn-vol-up {
      position: absolute;
      left: -3px;
      top: 125px;
      width: 3px;
      height: 40px;
      background: #333;
      border-radius: 2px 0 0 2px;
    }
    .btn-vol-down {
      position: absolute;
      left: -3px;
      top: 175px;
      width: 3px;
      height: 40px;
      background: #333;
      border-radius: 2px 0 0 2px;
    }
    .btn-silent {
      position: absolute;
      left: -3px;
      top: 100px;
      width: 3px;
      height: 18px;
      background: #333;
      border-radius: 2px 0 0 2px;
    }
    .home-indicator {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <h1>VERUM VINUM &mdash; Desktop &amp; Mobil</h1>
  <div class="container">
    <!-- Desktop -->
    <div class="device-wrapper">
      <span class="device-label">Desktop</span>
      <div class="laptop">
        <div class="laptop-screen">
          <iframe src="index.html"></iframe>
        </div>
        <div class="laptop-base"></div>
        <div class="laptop-shadow"></div>
      </div>
    </div>

    <!-- iPhone -->
    <div class="device-wrapper">
      <span class="device-label">iPhone</span>
      <div class="phone">
        <div class="btn-power"></div>
        <div class="btn-silent"></div>
        <div class="btn-vol-up"></div>
        <div class="btn-vol-down"></div>
        <div class="phone-screen">
          <iframe src="index.html"></iframe>
        </div>
        <div class="home-indicator"></div>
      </div>
    </div>
  </div>
</body>
</html>
