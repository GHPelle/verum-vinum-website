Instinct Premier 75-25 NV", "producer": "Victor Charlot", "type": "Mousserande", "country": "Frankrike", "region": "Moussy, Champagne, Frankrike"}, {"slug": "victor-charlot-lapprivoisee", "name": "L'Apprivoisée", "producer": "Victor Charlot", "type": "Mousserande", "country": "Frankrike", "region": "Moussy, Champagne, Frankrike"}, {"slug": "victor-charlot-lart-de-la-ruse", "name": "L'Art de la Ruse", "producer": "Victor Charlot", "type": "Mousserande", "country": "Frankrike", "region": "Moussy, Champagne, Frankrike"}, {"slug": "victor-charlot-les-terres-de-la-greve", "name": "Les Terres de la Grève", "producer": "Victor Charlot", "type": "Mousserande", "country": "Frankrike", "region": "Moussy, Champagne, Frankrike"}, {"slug": "victor-charlot-noirs-de-jais", "name": "Noirs de Jais", "producer": "Victor Charlot", "type": "Mousserande", "country": "Frankrike", "region": "Moussy, Champagne, Frankrike"}, {"slug": "villa-i-cipressi-brunello-di-montalcino", "name": "Brunello di Montalcino", "producer": "Villa i Cipressi", "type": "Rött", "country": "Italien", "region": "Montalcino, Toscana, Italien"}, {"slug": "villa-i-cipressi-rosso-di-montalcino", "name": "Rosso di Montalcino", "producer": "Villa i Cipressi", "type": "Rött", "country": "Italien", "region": "Montalcino, Toscana, Italien"}, {"slug": "villa-i-cipressi-zebras-brunello-di-montalcino", "name": "Zebras Brunello di Montalcino", "producer": "Villa i Cipressi", "type": "Rött", "country": "Italien", "region": "Montalcino, Toscana, Italien"}];

    const typeColors = {
      'Rött': 'bg-red-900/80 text-red-100',
      'Vitt': 'bg-amber-600/80 text-amber-50',
      'Rosé': 'bg-pink-400/80 text-pink-50',
      'Mousserande': 'bg-yellow-300/80 text-yellow-900',
      'Starkvin': 'bg-orange-800/80 text-orange-100',
    };

    const countryFlags = {
      'Italien': '🇮🇹',
      'Frankrike': '🇫🇷',
      'Portugal': '🇵🇹',
      'Tyskland': '🇩🇪',
      'Österrike': '🇦🇹',
    };

    // Populate dropdowns
    const countries = [...new Set(wines.map(w => w.country))].sort((a,b) => a.localeCompare(b,'sv'));
    const producers = [...new Set(wines.map(w => w.producer))].sort((a,b) => a.localeCompare(b,'sv'));
    const types = [...new Set(wines.map(w => w.type))].sort((a,b) => a.localeCompare(b,'sv'));

    const countryEl = document.getElementById('filter-country');
    const producerEl = document.getElementById('filter-producer');
    const typeEl = document.getElementById('filter-type');
    const searchEl = document.getElementById('search-text');

    countries.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = `${countryFlags[c] || ''} ${c}`; countryEl.appendChild(o); });
    producers.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; producerEl.appendChild(o); });
    types.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; typeEl.appendChild(o); });

    function renderResults() {
      const country = countryEl.value;
      const producer = producerEl.value;
      const type = typeEl.value;
      const text = searchEl.value.toLowerCase().trim();

      let filtered = wines;
      if (country) filtered = filtered.filter(w => w.country === country);
      if (producer) filtered = filtered.filter(w => w.producer === producer);
      if (type) filtered = filtered.filter(w => w.type === type);
      if (text) filtered = filtered.filter(w =>
        w.name.toLowerCase().includes(text) ||
        w.producer.toLowerCase().includes(text) ||
        w.region.toLowerCase().includes(text)
      );

      // Sort by producer then name
      filtered.sort((a, b) => {
        const pc = a.producer.localeCompare(b.producer, 'sv');
        if (pc !== 0) return pc;
        return a.name.localeCompare(b.name, 'sv');
      });

      const resultsEl = document.getElementById('results');
      const noResultsEl = document.getElementById('no-results');
      const countEl = document.getElementById('result-count');

      countEl.textContent = `Visar ${filtered.length} av ${wines.length} viner`;

      if (filtered.length === 0) {
        resultsEl.innerHTML = '';
        noResultsEl.classList.remove('hidden');
        return;
      }
      noResultsEl.classList.add('hidden');

      resultsEl.innerHTML = filtered.map(w => `
        <a href="sortiment/${w.slug}.html" class="flex items-center gap-4 p-4 bg-white rounded-lg border border-stone-100 hover:border-wine-200 hover:shadow-md transition-all group">
          <span class="${typeColors[w.type] || 'bg-stone-500 text-white'} px-2.5 py-1 rounded text-xs font-medium uppercase tracking-wider whitespace-nowrap">${w.type}</span>
          <div class="flex-1 min-w-0">
            <h3 class="font-serif text-lg text-stone-900 group-hover:text-wine-800 transition-colors truncate">${w.name}</h3>
            <p class="text-stone-400 text-sm truncate">${w.producer} &middot; ${w.region}</p>
          </div>
          <span class="text-xl hidden sm:block">${countryFlags[w.country] || ''}</span>
          <svg class="w-5 h-5 text-stone-300 group-hover:text-wine-500 transition-colors shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </a>
      `).join('');
    }

    function clearFilters() {
      countryEl.value = '';
      producerEl.value = '';
      typeEl.value = '';
      searchEl.value = '';
      renderResults();
    }

    // Event listeners
    countryEl.addEventListener('change', renderResults);
    producerEl.addEventListener('change', renderResults);
    typeEl.addEventListener('change', renderResults);
    searchEl.addEventListener('input', renderResults);
    document.getElementById('clear-filters').addEventListener('click', clearFilters);

    // Initial render
    renderResults();
  </script>
